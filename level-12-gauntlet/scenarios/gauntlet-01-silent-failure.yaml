---
# GAUNTLET 1 — The Silent Failure
#
# Symptom: The cluster looks healthy. All pods are Running.
# Users report intermittent errors. No alerts fired.
# Your job: find the root cause using only kubectl and cluster logs.
#
# DO NOT READ THE SPOILER BELOW until you have spent at least 20 minutes debugging.
#
# Setup:
#   kubectl apply -f gauntlet-01-silent-failure.yaml
#   kubectl rollout status deployment/frontend -n gauntlet
#
# Hint: Not all Running pods are actually serving traffic.
# ────────────────────────────────────────────────────────────────────────────────
# SPOILER (fold/collapse this in your editor):
# The backend deployment has readinessProbe checking /healthz which returns 200.
# But the "real" app endpoint /api is broken (the command exits immediately).
# Result: pod is Running, readiness probe passes, pod IS in Endpoints.
# But actual requests to /api fail with 500.
# Fix: the command should be a long-running process, not one that exits.

apiVersion: v1
kind: Namespace
metadata:
  name: gauntlet
  labels:
    lab: gauntlet-01
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: gauntlet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: gauntlet
spec:
  selector:
    app: frontend
  ports:
  - port: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: gauntlet
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: hashicorp/http-echo:latest
        args:
        - "-text=OK"
        - "-listen=:8080"
        # The readiness probe succeeds because the server starts up fine
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
        # THE BREAK: this liveness probe checks a path that the http-echo server
        # doesn't serve specially — but the real issue is that one-third of
        # replicas have a label app=backend-v2 that the service doesn't select.
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 64Mi
---
# THE BREAK: Service selector only matches app=backend.
# One of the 3 replicas has a DIFFERENT label set (see below).
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: gauntlet
spec:
  selector:
    app: backend    # Only matches 2 out of 3 pods
  ports:
  - port: 8080
    targetPort: 8080
---
# This pod has "app: backend-v2" — it's Running but gets NO traffic from the service.
# Users don't see errors (2/3 requests work) — they see "intermittent" errors.
# The pod with the broken response is this one, but it gets no traffic from the service.
# ACTUAL SCENARIO: The new version got a different label during the rollout.
# 1/3 of replicas are new version (app=backend-v2) but the service still points to old label.
apiVersion: v1
kind: Pod
metadata:
  name: backend-new
  namespace: gauntlet
  labels:
    app: backend-v2     # DIFFERENT label — excluded from Service
spec:
  containers:
  - name: backend
    image: hashicorp/http-echo:latest
    args:
    - "-text=ERROR - new version is broken"
    - "-listen=:8080"
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 64Mi
