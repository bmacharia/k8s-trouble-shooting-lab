---
apiVersion: v1
kind: Namespace
metadata:
  name: autoscale-lab
  labels:
    lab: "7.4"
---
# The application being scaled
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: autoscale-lab
  labels:
    lab: "7.4"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: web
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m      # HPA watches this — must be set for CPU-based HPA
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web-app-svc
  namespace: autoscale-lab
spec:
  selector:
    app: web-app
  ports:
  - port: 80
    targetPort: 80
