---
# StatefulSet with TWO breaks:
# Break 1: headless service selector mismatch (see 01-headless-service.yaml)
# Break 2: volumeClaimTemplate uses StorageClass "fast-ssd" which does not exist
#           in a standard kind/minikube cluster.
#           Result: redis-0 PVC stays Pending → redis-0 stays Pending →
#           redis-1 and redis-2 are never even attempted (ordered startup).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: databases
  labels:
    lab: "7.1"
spec:
  serviceName: redis-headless   # Must match the headless service name
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis         # Note: "redis" not "redis-cluster" — headless svc selector is wrong
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        - containerPort: 16379
          name: cluster-bus
        command: ["redis-server", "--appendonly", "yes"]
        volumeMounts:
        - name: data
          mountPath: /data
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: fast-ssd   # BUG: this StorageClass does not exist
      resources:
        requests:
          storage: 1Gi
