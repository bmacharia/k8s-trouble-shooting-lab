# ================================================================
# Lab 4.1: Multi-Layer Troubleshooting Challenge
# Deploy a broken 3-tier application and fix everything
#
# Instructions:
#   1. Apply this file: kubectl apply -f lab-4.1-fullstack-debug.yaml
#   2. Investigate all pods, services, and PVCs
#   3. Find and fix 3 bugs
#   4. Clean up: kubectl delete namespace fullstack-lab
#
# BUGS TO FIND AND FIX:
#   1. PVC uses wrong StorageClass -> fix or use default SC
#   2. Database Service selector doesn't match pod labels
#   3. API Service targetPort doesn't match container port
#
# Diagnostic commands:
#   kubectl get all -n fullstack-lab
#   kubectl get pvc -n fullstack-lab
#   kubectl describe pod -n fullstack-lab <pod>
#   kubectl get endpoints -n fullstack-lab
#   kubectl describe svc -n fullstack-lab <svc>
# ================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: fullstack-lab
---
# ── Tier 1: Database (has multiple issues) ──
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-data
  namespace: fullstack-lab
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: nonexistent-sc    # BUG 1: wrong storage class
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: fullstack-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
      - name: postgres
        image: postgres:16
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_PASSWORD
          value: "labpassword"
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: db-data
---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: fullstack-lab
spec:
  selector:
    app: db                           # BUG 2: wrong selector (should be "database")
  ports:
  - port: 5432
    targetPort: 5432
---
# ── Tier 2: API Backend ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: fullstack-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: nginx:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
          limits:
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: fullstack-lab
spec:
  selector:
    app: api
  ports:
  - port: 80
    targetPort: 8080              # BUG 3: nginx listens on 80, not 8080
---
# ── Tier 3: Frontend ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: fullstack-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: web
        image: nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: fullstack-lab
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080

# ================================================================
# SOLUTIONS:
# ================================================================
#
# Bug 1: PVC uses wrong StorageClass "nonexistent-sc"
#   kubectl get sc    # See available storage classes
#   kubectl delete pvc db-data -n fullstack-lab
#   # Recreate with correct/default storageClassName (or remove the field to use default)
#
# Bug 2: Database Service selector is "app: db" but pod label is "app: database"
#   kubectl patch svc database -n fullstack-lab --type='json' \
#     -p='[{"op": "replace", "path": "/spec/selector/app", "value": "database"}]'
#
# Bug 3: API Service targetPort is 8080 but nginx container listens on 80
#   kubectl patch svc api -n fullstack-lab --type='json' \
#     -p='[{"op": "replace", "path": "/spec/ports/0/targetPort", "value": 80}]'
#
# Clean up: kubectl delete namespace fullstack-lab
