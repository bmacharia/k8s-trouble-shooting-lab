---
# FIXED Pod 1: Non-root, read-only filesystem, dropped capabilities
apiVersion: v1
kind: Pod
metadata:
  name: secure-app
  namespace: secure-ns
  labels:
    lab: "8.2"
spec:
  # Pod-level security context
  securityContext:
    runAsNonRoot: true          # Pod must run as non-root user
    runAsUser: 1000             # Specific non-root UID
    runAsGroup: 3000
    fsGroup: 2000               # Files created in volumes owned by this GID
    seccompProfile:
      type: RuntimeDefault      # Enable default seccomp profile
  containers:
  - name: app
    image: nginx:alpine
    # nginx needs to write to /tmp and /var/cache/nginx — use emptyDir mounts
    # and a custom nginx config that doesn't require root
    securityContext:
      allowPrivilegeEscalation: false   # Can't gain more privileges than parent
      readOnlyRootFilesystem: true      # Cannot write to container filesystem
      capabilities:
        drop: ["ALL"]                   # Drop every Linux capability
        # Only add back what is specifically needed, e.g.:
        # add: ["NET_BIND_SERVICE"]     # If app needs to bind port < 1024
    volumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: nginx-cache
      mountPath: /var/cache/nginx
    - name: nginx-run
      mountPath: /var/run
    ports:
    - containerPort: 8080  # Non-privileged port (>1024)
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 64Mi
  volumes:
  - name: tmp
    emptyDir: {}
  - name: nginx-cache
    emptyDir: {}
  - name: nginx-run
    emptyDir: {}
