---
# Tier 3: Database
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: production
  labels:
    lab: "6.4"
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
      tier: database
  template:
    metadata:
      labels:
        app: database
        tier: database
    spec:
      containers:
      - name: database
        image: hashicorp/http-echo:latest
        args: ["-text=database", "-listen=:5432"]
        ports:
        - containerPort: 5432
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
