---
# Tier 1: Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: production
  labels:
    lab: "6.4"
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
      tier: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: hashicorp/http-echo:latest
        args: ["-text=frontend", "-listen=:8080"]
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: production
spec:
  selector:
    app: frontend
    tier: frontend
  ports:
  - port: 8080
    targetPort: 8080
---
# Tier 2: Backend API
apiVersion: apps/v1
kind: Deployment
