---
# BREAK: Broken CoreDNS ConfigMap
# The Corefile has two bugs:
# Bug 1: The forward directive points to a non-existent upstream (10.0.0.1)
#         External DNS lookups (google.com, etc.) will fail with SERVFAIL.
# Bug 2: The cache TTL is set to 1 second — causes excessive upstream queries
#         and makes intermittent failures much worse.
#
# IMPORTANT: Apply this carefully in a lab cluster only.
# Restoring the original ConfigMap fixes everything (see 03-solution.yaml).
#
# To apply:
#   kubectl apply -f 02-coredns-broken.yaml
#   kubectl rollout restart deployment/coredns -n kube-system
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
  labels:
    lab: "6.5"
    break: "true"
data:
  Corefile: |
    .:53 {
        errors
        health {
           lameduck 5s
        }
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
           pods insecure
           fallthrough in-addr.arpa ip6.arpa
           ttl 30
        }
        prometheus :9153
        forward . 10.0.0.1    # BUG 1: non-existent upstream DNS server
        cache 1               # BUG 2: 1-second cache TTL (should be 30)
        loop
        reload
        loadbalance
    }
