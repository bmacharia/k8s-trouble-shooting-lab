---
# SOLUTION: Correct CoreDNS ConfigMap
# Fix 1: Use a real public DNS upstream (or your internal resolver)
# Fix 2: Set cache TTL to 30 seconds (the Kubernetes default)
#
# After applying:
#   kubectl apply -f 03-solution.yaml
#   kubectl rollout restart deployment/coredns -n kube-system
#   kubectl rollout status deployment/coredns -n kube-system
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
  labels:
    lab: "6.5"
data:
  Corefile: |
    .:53 {
        errors
        health {
           lameduck 5s
        }
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
           pods insecure
           fallthrough in-addr.arpa ip6.arpa
           ttl 30
        }
        prometheus :9153
        forward . 8.8.8.8 8.8.4.4   # FIXED: use real upstream DNS servers
        cache 30                      # FIXED: 30-second cache (sane default)
        loop
        reload
        loadbalance
    }
