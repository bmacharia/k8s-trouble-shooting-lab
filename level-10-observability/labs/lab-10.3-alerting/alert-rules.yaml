---
# Lab 10.3 — Production Alert Rules
# These are the alerts that actually matter.
# Every alert has: a clear name, summary, description, and runbook URL.
# Apply with: kubectl apply -f alert-rules.yaml
# Requires Prometheus Operator (from kube-prometheus-stack)
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: k8s-sre-alerts
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: monitoring
spec:
  groups:

  # ─────────────────────────────────────────────────────────────────────
  - name: cluster.health
    interval: 60s
    rules:

    - alert: NodeNotReady
      expr: kube_node_status_condition{condition="Ready",status="true"} == 0
      for: 2m
      labels:
        severity: critical
        team: platform
      annotations:
        summary: "Node {{ $labels.node }} is NotReady"
        description: |
          Node {{ $labels.node }} has been NotReady for more than 2 minutes.
          Pods on this node are not being scheduled.
          ACTION: SSH to node, check: systemctl status kubelet && journalctl -u kubelet -n 50
        runbook: "https://wiki.example.com/runbooks/node-not-ready"

    - alert: NodeDiskPressure
      expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
      for: 1m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "Node {{ $labels.node }} has disk pressure"
        description: |
          Node {{ $labels.node }} is under disk pressure.
          Pods may be evicted. Check: df -h on the node,
          crictl images (container images consuming space),
          /var/log (log files consuming space)

    - alert: NodeMemoryPressure
      expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
      for: 1m
      labels:
        severity: critical
        team: platform
      annotations:
        summary: "Node {{ $labels.node }} has memory pressure"
        description: |
          Node {{ $labels.node }} is under memory pressure. Pod eviction may occur.
          ACTION: kubectl top pods -A --sort-by=memory | head -20

  # ─────────────────────────────────────────────────────────────────────
  - name: pod.health
    interval: 30s
    rules:

    - alert: PodCrashLooping
      expr: increase(kube_pod_container_status_restarts_total[1h]) > 5
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
        description: |
          Container {{ $labels.container }} in pod {{ $labels.pod }} has restarted
          {{ $value | printf "%.0f" }} times in the last hour.
          ACTION: kubectl logs {{ $labels.pod }} -n {{ $labels.namespace }} --previous

    - alert: PodOOMKilled
      expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled"
        description: |
          Container {{ $labels.container }} was killed by the OOM killer.
          It exceeded its memory limit.
          ACTION: Increase memory limit OR find and fix the memory leak.
          Check VPA recommendations if installed.

    - alert: PodNotReady
      expr: |
        kube_pod_status_ready{condition="false"}
          * on(pod, namespace) group_left(owner_kind)
          kube_pod_owner{owner_kind="ReplicaSet"}
        > 0
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been not ready for 10m"
        description: |
          Pod {{ $labels.pod }} in {{ $labels.namespace }} has been failing its readiness probe.
          ACTION: kubectl describe pod {{ $labels.pod }} -n {{ $labels.namespace }}

    - alert: DeploymentReplicasMismatch
      expr: |
        kube_deployment_status_replicas_available
          != kube_deployment_spec_replicas
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has fewer replicas than desired"
        description: |
          Deployment {{ $labels.deployment }} in {{ $labels.namespace }}
          has {{ $value }} available replicas but {{ $labels.desired }} are desired.

  # ─────────────────────────────────────────────────────────────────────
  - name: resource.usage
    interval: 60s
    rules:

    - alert: ContainerCPUThrottling
      expr: |
        rate(container_cpu_cfs_throttled_seconds_total{container!=""}[5m])
          / rate(container_cpu_cfs_periods_total{container!=""}[5m])
          > 0.25
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Container {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} is CPU throttled"
        description: |
          Container {{ $labels.container }} is throttled {{ $value | humanizePercentage }} of the time.
          This causes latency even when CPU utilization looks low.
          ACTION: Increase CPU limit OR reduce CPU request (to allow burstable behavior)

    - alert: ContainerMemoryNearLimit
      expr: |
        container_memory_working_set_bytes{container!=""}
          / on(pod, container, namespace)
          kube_pod_container_resource_limits{resource="memory", container!=""}
          > 0.90
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Container {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} memory near limit"
        description: |
          Container {{ $labels.container }} is using {{ $value | humanizePercentage }} of its memory limit.
          At 100% it will be OOMKilled.
          ACTION: Increase memory limit OR investigate memory leak.

    - alert: PersistentVolumeDiskFull
      expr: |
        kubelet_volume_stats_used_bytes /
          kubelet_volume_stats_capacity_bytes > 0.85
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is 85% full"
        description: |
          PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }}
          is {{ $value | humanizePercentage }} full.
          ACTION: Increase PVC size or clean up data before disk fills.

  # ─────────────────────────────────────────────────────────────────────
  - name: control.plane
    interval: 60s
    rules:

    - alert: APIServerHighLatency
      expr: |
        histogram_quantile(0.99,
          rate(apiserver_request_duration_seconds_bucket[5m])
        ) > 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "API server p99 latency is above 1 second"
        description: |
          API server 99th percentile request latency is {{ $value }}s.
          This indicates the API server or etcd is under heavy load.
          ACTION: Check etcd health. Check apiserver audit logs for expensive queries.

    - alert: EtcdLeaderChange
      expr: increase(etcd_server_leader_changes_seen_total[1h]) > 0
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "etcd leader changed"
        description: |
          etcd had {{ $value }} leader changes in the last hour.
          Frequent leader changes indicate network issues or slow disk I/O.
          ACTION: Check etcd pod logs. Check disk I/O on etcd node.

    - alert: CertificateExpiringSoon
      expr: |
        apiserver_client_certificate_expiration_seconds{quantile="0.01"}
          < 30 * 24 * 3600
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Kubernetes certificate expiring in less than 30 days"
        description: |
          A client certificate expires in {{ $value | humanizeDuration }}.
          ACTION: sudo kubeadm certs check-expiration && sudo kubeadm certs renew all

  # ─────────────────────────────────────────────────────────────────────
  - name: batch.jobs
    interval: 60s
    rules:

    - alert: JobFailed
      expr: kube_job_status_failed > 0
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Job {{ $labels.namespace }}/{{ $labels.job_name }} failed"
        description: |
          Job {{ $labels.job_name }} in {{ $labels.namespace }} has {{ $value }} failed pods.
          ACTION: kubectl logs -l job-name={{ $labels.job_name }} -n {{ $labels.namespace }}

    - alert: CronJobNotRun
      expr: |
        time() - kube_cronjob_status_last_schedule_time
          > kube_cronjob_spec_suspend * 0
          + 86400
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "CronJob {{ $labels.namespace }}/{{ $labels.cronjob }} has not run in 24h"
        description: |
          CronJob {{ $labels.cronjob }} in {{ $labels.namespace }}
          has not run in more than 24 hours. Check the schedule expression and
          whether the CronJob is suspended.
